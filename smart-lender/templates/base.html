<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Lender AI{% endblock %} - Bank Portal</title>
    
    <!-- Google Fonts: Manrope & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Background Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Header / Navigation -->
    <header class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <i class="fa-solid fa-shield-halved logo-icon"></i>
                <span class="logo-text">Smart Lender <span class="logo-highlight">AI</span></span>
            </a>
            
            <nav class="nav-menu" id="navMenu">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">🏠 Home</a>
                <a href="/predict" class="nav-link {% if request.path == '/predict' or request.path == '/result' %}active{% endif %}">💳 Predict Loan</a>
                <a href="/history" class="nav-link {% if request.path == '/history' or request.path == '/profile' %}active{% endif %}">🕒 History</a>
                <a href="/about" class="nav-link {% if request.path == '/about' %}active{% endif %}">ℹ️ About</a>
            </nav>
            
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggleBtn" aria-label="Toggle Dark Mode" style="background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--primary); margin-right: 15px; padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.3s, color 0.3s;">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <a href="/predict" class="btn btn-primary btn-nav">Get Started</a>
                <button class="hamburger" id="hamburgerBtn" aria-label="Toggle Navigation">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-brand">
                <i class="fa-solid fa-shield-halved"></i> Smart Lender AI
            </div>
            <div class="footer-text">
                AI-Based Loan Eligibility Prediction System &middot; Institutional Risk Suite
            </div>
            <div class="footer-copy">
                &copy; 2026 Smart Lender AI. All Rights Reserved.
            </div>
        </div>
    </footer>

    <!-- Core Script -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        // Dark Mode Theme Init and Toggle
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const themeIcon = themeToggleBtn ? themeToggleBtn.querySelector('i') : null;
        const currentTheme = localStorage.getItem('theme') || 'light';
        
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            if (themeIcon) {
                themeIcon.className = 'fa-solid fa-sun';
            }
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            if (themeIcon) {
                themeIcon.className = 'fa-solid fa-moon';
            }
        }
        
        if (themeToggleBtn) {
            themeToggleBtn.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                if (current === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'light');
                    localStorage.setItem('theme', 'light');
                    if (themeIcon) themeIcon.className = 'fa-solid fa-moon';
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    localStorage.setItem('theme', 'dark');
                    if (themeIcon) themeIcon.className = 'fa-solid fa-sun';
                }
            });
        }

        // Dynamic navbar glassmorphism on scroll
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 20) {
                navbar.classList.add('navbar-scrolled');
            } else {
                navbar.classList.remove('navbar-scrolled');
            }
        });
    </script>
</body>
</html>
